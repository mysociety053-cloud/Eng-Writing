<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>또박또박 영어 — 쓰기와 말하기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&family=Andika:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF6EC; --paper2:#FFFDF8; --ink:#2C2A26; --ink-soft:#7A7264;
    --green:#2F8F77; --green-d:#246F5C; --coral:#EE6C4D; --coral-d:#D8543A;
    --sky:#9BC7DC; --base-line:#E0876B; --gold:#F4C95D;
    --border:#E7DDC6; --shadow:rgba(80,55,15,.12); --good:#2F8F77; --bad:#D8543A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:'Gowun Dodum',sans-serif; color:var(--ink);
    background:
      radial-gradient(circle at 12% 8%, rgba(244,201,93,.18), transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(47,143,119,.14), transparent 42%),
      var(--paper);
    background-attachment:fixed; min-height:100vh;
  }
  h1,h2,h3,.jua{font-family:'Jua',sans-serif; font-weight:400; letter-spacing:.5px;}
  .wrap{max-width:920px; margin:0 auto; padding:18px 16px 80px;}
  .topbar{display:flex; align-items:center; gap:12px; padding:12px 16px; margin:-4px 0 18px;
    background:var(--paper2); border:2px solid var(--border); border-radius:18px; box-shadow:0 6px 0 var(--shadow);}
  .logo{font-family:'Jua'; font-size:1.45rem; color:var(--green-d);}
  .logo .pen{color:var(--coral);}
  .spacer{flex:1;}
  .who{font-size:.9rem; color:var(--ink-soft);}
  .who b{color:var(--ink);}
  button{font-family:'Jua',sans-serif; cursor:pointer; border:none; font-size:1rem;}
  .btn{background:var(--green); color:#fff; padding:11px 18px; border-radius:14px;
    box-shadow:0 4px 0 var(--green-d); transition:transform .06s, box-shadow .06s;}
  .btn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--green-d);}
  .btn.coral{background:var(--coral); box-shadow:0 4px 0 var(--coral-d);}
  .btn.coral:active{box-shadow:0 1px 0 var(--coral-d);}
  .btn.ghost{background:#fff; color:var(--ink); box-shadow:0 4px 0 var(--border); border:2px solid var(--border);}
  .btn.ghost:active{box-shadow:0 1px 0 var(--border);}
  .btn.sm{padding:7px 13px; font-size:.9rem; border-radius:11px;}
  .btn.lg{padding:15px 26px; font-size:1.2rem; border-radius:18px;}
  .btn[disabled]{opacity:.45; cursor:not-allowed; transform:none;}
  .card{background:var(--paper2); border:2px solid var(--border); border-radius:20px;
    padding:20px; box-shadow:0 8px 0 var(--shadow); margin-bottom:18px; animation:rise .35s ease both;}
  @keyframes rise{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;}}
  label{display:block; font-size:.9rem; color:var(--ink-soft); margin:0 0 5px 3px;}
  input[type=text],input[type=number],input[type=password],textarea,select{
    width:100%; font-family:'Gowun Dodum'; font-size:1rem; color:var(--ink);
    padding:11px 13px; border:2px solid var(--border); border-radius:12px; background:#fff; outline:none;}
  input:focus,textarea:focus,select:focus{border-color:var(--green);}
  textarea{resize:vertical; min-height:96px; line-height:1.6;}
  .row{display:flex; gap:12px; flex-wrap:wrap;}
  .row>div{flex:1; min-width:120px;}
  .grid-cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px;}
  .tile{background:#fff; border:2px solid var(--border); border-radius:16px; padding:16px;
    text-align:center; box-shadow:0 5px 0 var(--shadow); cursor:pointer; transition:transform .08s;}
  .tile:hover{transform:translateY(-3px);}
  .tile .emoji{font-size:2rem; display:block; margin-bottom:6px;}
  .tile .t{font-family:'Jua'; font-size:1.1rem;}
  .tile.on{border-color:var(--green); background:#E9F6F0; box-shadow:0 5px 0 var(--green);}
  .tile.on::after{content:'✓'; position:absolute; top:6px; right:10px; color:var(--green-d); font-family:'Jua';}
  .tile{position:relative;}
  .tile .s{font-size:.8rem; color:var(--ink-soft); margin-top:4px;}
  .chip{display:inline-flex; align-items:center; gap:6px; background:#fff; border:2px solid var(--border);
    border-radius:999px; padding:6px 12px; font-size:.85rem; margin:0 6px 6px 0;}
  .chip.lib-g{cursor:pointer; font-family:'Jua';}
  .chip.lib-g.on{background:var(--green); color:#fff; border-color:var(--green);}
  .pill{display:inline-block; padding:3px 10px; border-radius:999px; font-size:.78rem; font-family:'Jua';}
  .pill.done{background:#E3F3ED; color:var(--green-d);}
  .pill.not{background:#FCE6DF; color:var(--coral-d);}
  .item-row{display:flex; align-items:center; gap:10px; padding:9px 12px; border:2px solid var(--border);
    border-radius:12px; background:#fff; margin-bottom:8px;}
  .item-row input[type=checkbox]{width:20px; height:20px; accent-color:var(--green); flex:0 0 auto;}
  .item-row .txt{flex:1; font-family:'Andika'; font-size:1.05rem; word-break:break-word;}
  .item-row .ty{font-size:.72rem; color:var(--ink-soft); background:#F4EEDF; padding:2px 8px; border-radius:8px; flex:0 0 auto;}
  .del{background:none; color:var(--coral-d); font-size:1.2rem; padding:2px 6px; box-shadow:none;}
  .muted{color:var(--ink-soft); font-size:.9rem;}
  .center{text-align:center;}
  .hr{height:2px; background:var(--border); border-radius:2px; margin:16px 0;}
  .seg{display:inline-flex; background:#F1E9D6; border-radius:12px; padding:4px; gap:4px; margin-bottom:14px; flex-wrap:wrap;}
  .seg button{background:transparent; color:var(--ink-soft); padding:8px 14px; border-radius:9px;}
  .seg button.on{background:#fff; color:var(--ink); box-shadow:0 2px 0 var(--shadow);}
  .progress{height:14px; background:#EFE6D2; border-radius:999px; overflow:hidden; border:1px solid var(--border);}
  .progress>div{height:100%; background:linear-gradient(90deg,var(--gold),var(--green)); width:0; transition:width .4s;}
  /* tracing */
  .trace-line{position:relative; margin:10px 0; border-radius:14px; overflow:hidden;
    border:2px solid var(--border); background:#fff; touch-action:none;}
  .trace-line.locked{opacity:.85;}
  .trace-line.future{opacity:.35; pointer-events:none;}
  .trace-line canvas{display:block; width:100%;}
  .trace-line .ink{position:absolute; inset:0;}
  .badge{position:absolute; top:8px; right:10px; font-family:'Jua'; font-size:.95rem; padding:3px 11px;
    border-radius:999px; display:none;}
  .badge.show{display:block; animation:pop .3s ease both;}
  .badge.ok{background:#E3F3ED; color:var(--green-d);}
  .badge.try{background:#FCE6DF; color:var(--coral-d);}
  @keyframes pop{from{transform:scale(.6); opacity:0;} to{transform:scale(1); opacity:1;}}
  .line-tools{display:flex; gap:8px; justify-content:flex-end; margin-top:4px;}
  .model-card{background:#FFFCF4; border:2px dashed var(--green); border-radius:14px; padding:6px 10px;}
  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:12px 20px; border-radius:14px; font-family:'Jua';
    opacity:0; transition:.3s; z-index:50; box-shadow:0 8px 20px rgba(0,0,0,.25);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .celebrate{position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:60;
    background:rgba(43,42,38,.55); backdrop-filter:blur(3px);}
  .celebrate.show{display:flex; animation:rise .3s ease both;}
  .celebrate .box{background:var(--paper2); border-radius:24px; padding:34px 30px; text-align:center;
    border:3px solid var(--gold); box-shadow:0 14px 0 var(--shadow); max-width:340px;}
  .celebrate .big{font-size:3.2rem;}
  .back{background:none; box-shadow:none; color:var(--green-d); font-family:'Jua'; padding:6px 2px; font-size:1rem;}
  .empty{text-align:center; color:var(--ink-soft); padding:30px 10px;}
  .empty .em{font-size:2.4rem; display:block; margin-bottom:8px;}
  .roster{display:grid; grid-template-columns:1fr; gap:8px;}
  .stu-card{display:flex; align-items:center; gap:12px; background:#fff; border:2px solid var(--border);
    border-radius:14px; padding:11px 14px;}
  .stu-card .nm{font-family:'Jua'; flex:1;}
  .stu-card .mini{height:10px; width:90px; background:#EFE6D2; border-radius:999px; overflow:hidden;}
  .stu-card .mini>div{height:100%; background:var(--green);}
  .legend{font-size:.82rem; color:var(--ink-soft); margin-bottom:10px;}
  .count-ctrl{display:flex; align-items:center; gap:10px;}
  .count-ctrl button{width:40px; height:40px; border-radius:12px; background:var(--gold); color:var(--ink); box-shadow:0 3px 0 #d8ab3e;}
  .count-ctrl .n{font-family:'Jua'; font-size:1.6rem; min-width:42px; text-align:center;}
  /* multi-copy tracing line */
  .trace-row{display:flex; gap:0; border:2px solid var(--border); border-radius:14px; overflow:hidden; background:#fff; margin:10px 0;}
  .trace-cell{position:relative; flex:1 1 0; min-width:0; touch-action:none; border-right:2px dashed var(--border);}
  .trace-cell:last-child{border-right:none;}
  .trace-cell.future{opacity:.32; pointer-events:none;}
  .trace-cell.locked{opacity:.95;}
  .trace-cell canvas{display:block; width:100%;}
  .trace-cell .ink{position:absolute; inset:0;}
  .trace-cell .badge{top:4px; right:6px; font-size:.85rem; padding:1px 8px;}
  @media(max-width:520px){ .wrap{padding:12px 10px 80px;} .card{padding:15px;} .logo{font-size:1.2rem;} }
  /* speaking practice */
  .speak-hero{border-radius:22px; padding:26px 20px; text-align:center; color:#fff;
    background:linear-gradient(135deg,#3b6fd4,#6a4bd8); box-shadow:0 10px 0 rgba(60,40,120,.25);}
  .speak-hero .tag{display:inline-block; font-family:'Jua'; font-size:.72rem; letter-spacing:.5px;
    background:rgba(255,255,255,.22); padding:4px 12px; border-radius:999px; margin-bottom:12px;}
  .speak-hero .word{font-family:'Andika'; font-weight:700; font-size:2.8rem; line-height:1.1;}
  .speak-hero .mean{font-size:1.05rem; opacity:.95; margin-top:4px;}
  .speak-hero .listen{margin-top:16px; background:rgba(255,255,255,.95); color:#3b3a86;
    font-family:'Jua'; padding:11px 20px; border-radius:14px; box-shadow:0 4px 0 rgba(0,0,0,.15);}
  .speak-hero .listen:active{transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.15);}
  .chal-dots{display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap;}
  .chal-dots .d{width:30px; height:30px; border-radius:999px; border:2px solid var(--border);
    display:flex; align-items:center; justify-content:center; font-family:'Jua'; font-size:.85rem; color:var(--ink-soft); background:#fff;}
  .chal-dots .d.on{background:var(--green); border-color:var(--green); color:#fff;}
  .mic-zone{border:2px dashed var(--border); border-radius:16px; padding:22px 16px; text-align:center; background:#FBFAF6;}
  .mic-btn{width:84px; height:84px; border-radius:999px; background:var(--coral); color:#fff; font-size:2rem;
    box-shadow:0 6px 0 var(--coral-d); margin-bottom:6px;}
  .mic-btn:active{transform:translateY(3px); box-shadow:0 3px 0 var(--coral-d);}
  .mic-btn.rec{background:#d83a3a; box-shadow:0 6px 0 #a82a2a; animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);} 50%{transform:scale(1.07);}}
  .heard{font-family:'Andika'; font-size:1.15rem; min-height:1.4em;}
  .score-big{font-family:'Jua'; font-size:2rem;}
  .score-row{display:flex; gap:12px; margin-top:12px;}
  .score-row>div{flex:1; background:#fff; border:2px solid var(--border); border-radius:14px; padding:12px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo">✏️🗣️ 또박또박 <span class="pen">영어</span></div>
    <div class="spacer"></div>
    <div class="who" id="who"></div>
    <button class="btn ghost sm" id="logoutBtn" style="display:none">처음으로</button>
  </div>
  <div id="app"></div>
</div>
<div class="toast" id="toast"></div>
<div class="celebrate" id="celebrate"><div class="box">
  <div class="big">🎉</div>
  <h2 style="margin:8px 0">과제 완료!</h2>
  <p class="muted" id="celebMsg">모든 낱말과 문장을 또박또박 다 썼어요!</p>
  <button class="btn lg coral" onclick="closeCeleb()">좋아요!</button>
</div></div>

<script>
/* ============================ BACKEND CONFIG ============================ */
/*  ▼▼▼  여기만 채우면 됩니다  ▼▼▼
    1) FIREBASE_CONFIG : Firebase 콘솔 → 프로젝트 설정 → '내 앱'의 구성값 복사
    2) DATABASE_ID     : 전용(이름 있는) Firestore DB의 ID. 예) "english-trace"
                         ※ (default)를 쓰면 빈 칸으로 두세요. 지금은 전용 DB 방식!
    3) COLLECTION_PREFIX: 컬렉션 접두사(다른 앱과 분리). 그대로 둬도 됨.            */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCHUXPjWyVdaPcKhgEk6PtstJJ4zI14h4A",
  authDomain: "class-relation2.firebaseapp.com",
  projectId: "class-relation2",
  storageBucket: "class-relation2.firebasestorage.app",
  messagingSenderId: "90743477473",
  appId: "1:90743477473:web:7f836a9298763cb7e6d3a0"
};
const DATABASE_ID = "english-trace";   // ← 콘솔에서 만든 전용 DB의 ID와 똑같이!
const COLLECTION_PREFIX = "eng_";       // → eng_app, eng_progress
/*  ▲▲▲  여기까지  ▲▲▲  */
const BACKEND_READY = !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.projectId);
// 모듈 스크립트가 읽어갈 설정
window.__cfg = { config:FIREBASE_CONFIG, dbId:DATABASE_ID, ready:BACKEND_READY };

/* ============================ STORAGE LAYER (Firestore) ============================ */
const KEYS = { classes:'v1:classes', assignments:'v1:assignments', settings:'v1:settings', lists:'v1:lists' };
let fbReady=false, backendError='';
const mem={}; // 백엔드 연결 전/실패 시 임시 메모리(기기 간 공유 안 됨)
function colName(name){ return COLLECTION_PREFIX+name; }
function keyRef(key){
  if(key.indexOf('v1:prog:')===0) return { col:colName('progress'), id:key.slice(8).replace(/:/g,'__') };
  return { col:colName('app'), id:key.replace(/^v1:/,'').replace(/:/g,'_') };
}
async function sGet(key, def){
  if(fbReady && window.__store){ try{ const {col,id}=keyRef(key); const v=await window.__store.get(col,id);
    return v===undefined ? def : v; }catch(e){ console.warn('sGet',key,e); return def; } }
  return (key in mem)? mem[key] : def;
}
async function sSet(key, val){
  if(fbReady && window.__store){ try{ const {col,id}=keyRef(key); await window.__store.set(col,id,val); return true; }
    catch(e){ console.warn('sSet',key,e);
      const msg=(e&&(e.code||e.message))||'';
      if(/permission/i.test(msg)) toast('저장 권한이 없어요. 선생님 계정/보안 규칙의 이메일을 확인하세요.');
      else toast('저장 중 오류가 발생했어요.');
      return false; } }
  mem[key]=val; return true;
}
const progKey = (aid,sid)=> `v1:prog:${aid}:${sid}`;
async function sDel(key){
  if(fbReady && window.__store){ try{ const {col,id}=keyRef(key); await window.__store.del(col,id); return true; }catch(e){ console.warn('sDel',key,e); return false; } }
  delete mem[key]; return true;
}
function setupLiveSync(){
  if(!(fbReady && window.__store)) return;
  const c=colName('app');
  window.__store.watch(c,'classes', v=> DB.classes=v||[]);
  window.__store.watch(c,'assignments', v=> DB.assignments=v||[]);
  window.__store.watch(c,'lists', v=> DB.lists=v||[]);
}

/* ============================ APP STATE ============================ */
let DB = { classes:[], assignments:[], lists:[] };
let session = { role:null, name:null, classId:null, studentId:null };
const uid = ()=> Math.random().toString(36).slice(2,9);
const $ = (id)=> document.getElementById(id);
const app = $('app');

async function boot(){
  if(window.__booted) return; window.__booted=true;
  const b = window.__backend || { ready:false };
  fbReady = !!b.ready; backendError = b.error||'';
  if(fbReady){
    DB.classes = await sGet(KEYS.classes, []);
    DB.assignments = await sGet(KEYS.assignments, []);
    DB.lists = await sGet(KEYS.lists, []);
    setupLiveSync();
  }
  await document.fonts.ready.catch(()=>{});
  if(!BACKEND_READY){ renderSetupNeeded(); return; }
  if(!fbReady){ renderBackendError(); return; }
  renderHome();
}
function renderSetupNeeded(){
  $('who').textContent=''; $('logoutBtn').style.display='none';
  app.innerHTML = `
    <div class="card">
      <h2 style="margin-top:4px">⚙️ 백엔드 설정이 필요해요</h2>
      <p class="muted">선생님은 이메일 로그인, 학생은 자동 익명 로그인으로 동작해요. 아래 순서대로 한 번만 설정하면 됩니다.</p>
      <ol style="line-height:1.9; padding-left:20px">
        <li><b>Firestore Database → 데이터베이스 추가</b> → <b>프로덕션 모드</b>, 위치 <b>asia-northeast3</b>, ID <b>english-trace</b>로 생성.</li>
        <li><b>Authentication → 시작하기</b> → 로그인 방법에서 <b>이메일/비밀번호</b>와 <b>익명</b> 두 가지를 <b>사용 설정</b>.</li>
        <li><b>⚙️ 프로젝트 설정 → 내 앱</b>의 <b>firebaseConfig</b> 복사 → 파일 위쪽 <b>FIREBASE_CONFIG</b>에 붙여넣고, <b>DATABASE_ID</b>를 <code>english-trace</code>로.</li>
        <li>그 전용 DB의 <b>규칙(Rules)</b> 탭에 아래 규칙을 붙여넣고 <b>게시</b>. (이메일은 선생님 본인 것으로 바꾸기)</li>
        <li><b>Netlify Drop</b>(netlify.com/drop)에 파일을 올려 링크 완성 → 학생들에게 공유.</li>
        <li>그 링크로 들어가 <b>선생님</b> → <b>계정 만들기</b>로 위 4번에 적은 이메일/비번 계정을 한 번 생성하면 끝!</li>
      </ol>
      <div style="background:#FBF3E0; border:2px solid var(--gold); border-radius:12px; padding:12px; margin-top:6px">
        <b>보안 규칙</b> — 쓰기는 선생님 계정만, 읽기·진행 저장은 인증된 사용자(학생 익명 포함):
        <code style="font-size:.8rem; display:block; margin-top:6px; white-space:pre-wrap">rules_version = '2';
service cloud.firestore {
  match /databases/{db}/documents {
    match /eng_app/{doc} {
      allow read: if request.auth != null;
      allow write: if request.auth != null
        && request.auth.token.email == 'teacher@example.com';
    }
    match /eng_progress/{doc} {
      allow read, write: if request.auth != null;
    }
  }
}</code>
        <span class="muted" style="font-size:.8rem">※ <b>teacher@example.com</b>을 선생님 이메일로 꼭 바꾸세요. 이 이메일 계정만 학급·과제를 만들 수 있어요. (접두사 eng_를 바꿨다면 규칙 이름도 맞추기)</span>
      </div>
      <p class="muted" style="margin-top:12px">설정을 마치면 이 화면 대신 시작 화면이 떠요. 연결은 <b>🔧 연결 상태 확인</b>으로 점검할 수 있어요.</p>
      <div class="center" style="margin-top:8px"><button class="btn" id="goDiag2">🔧 연결 상태 확인</button></div>
    </div>`;
  $('goDiag2').onclick=diagnosticsScreen;
}
function renderBackendError(){
  $('who').textContent='';
  app.innerHTML = `
    <div class="card">
      <h2 style="margin-top:4px">⚠️ 백엔드 연결 실패</h2>
      <p class="muted">설정값은 들어 있는데 연결되지 않았어요.</p>

/* ============================ SPEAKING PRACTICE ============================ */
const SPEAK_GOAL = 5;
let speakRec = null;
let studentMode = 'write';   // 'write' | 'speak'
function assignmentHasMode(a, m){ const md=a.mode||'write'; return m==='speak' ? (md==='speak'||md==='both') : (md==='write'||md==='both'); }
const TTS_VOICE='en-US-Neural2-F';   // 고품질 원어민 음성 이름 (en-US-* 중에서 바꿀 수 있어요)
const ttsUrlCache=new Map();         // 같은 텍스트는 한 세션에서 URL 재사용 (함수 호출 0)
let ttsAudio=null;
function fallbackSpeak(text){        // 클라우드 음성이 없거나 실패하면 기기 내장 음성으로
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=0.9;
    const vs=speechSynthesis.getVoices(); const v=vs.find(x=>/^en[-_]/i.test(x.lang)); if(v) u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}
function speakStop(){ if(speakRec){ try{ speakRec.stop(); }catch(e){} speakRec=null; }
  if(ttsAudio){ try{ ttsAudio.pause(); }catch(e){} ttsAudio=null; }
  try{ speechSynthesis.cancel(); }catch(e){} }
// 마이크 권한을 명시적으로 확보하고 즉시 반납한다(스트림을 붙들지 않음).
// SpeechRecognition의 암묵적 권한요청보다 안정적이고, 실패 원인을 분명히 알려준다.
async function ensureMic(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return {ok:true};
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    s.getTracks().forEach(t=> t.stop());   // 권한만 확인하고 마이크를 곧바로 반납
    return {ok:true};
  }catch(e){ return {ok:false, err:e}; }
}
async function speak(text){
  try{ speechSynthesis.cancel(); }catch(e){}
  if(ttsAudio){ try{ ttsAudio.pause(); }catch(e){} ttsAudio=null; }
  if(window.__tts){
    try{
      let url=ttsUrlCache.get(text);
      if(!url){ url=await window.__tts(text, TTS_VOICE); if(url) ttsUrlCache.set(text, url); }
      if(url){ const au=new Audio(url); ttsAudio=au; await au.play(); return; }
    }catch(e){ /* 아래 폴백으로 */ }
  }
  fallbackSpeak(text);
}
function spNorm(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
function spLev(a,b){ const m=a.length,n=b.length; if(!m)return n; if(!n)return m; const d=[]; for(let j=0;j<=n;j++)d[j]=j;
  for(let i=1;i<=m;i++){ let prev=d[0]; d[0]=i; for(let j=1;j<=n;j++){ const tmp=d[j]; d[j]=Math.min(d[j]+1,d[j-1]+1,prev+(a[i-1]===b[j-1]?0:1)); prev=tmp; } } return d[n]; }
function scoreSpeech(target, alts){
  const t=spNorm(target); let best=0, bestHeard='';
  (alts||[]).forEach(raw=>{ const h=spNorm(raw); if(!h) return;
    const ml=Math.max(t.length,h.length)||1; let sc=Math.round((1-spLev(t,h)/ml)*100);
    if(t.includes(' ')){ const tw=t.split(' '), hw=new Set(h.split(' ')); const hit=tw.filter(w=>hw.has(w)).length;
      sc=Math.max(sc, Math.round((sc + Math.round(hit/tw.length*100))/2)); }
    if(sc>best){ best=sc; bestHeard=raw; }
  });
  return { score:Math.max(0,Math.min(100,best)), heard:bestHeard };
}

function speakPractice(listId, idx){
  speakStop();
  const l=DB.lists.find(x=>x.id===listId); if(!l){ speakHome(); return; }
  idx=Math.max(0, Math.min(idx, l.items.length-1));
  const it=l.items[idx];
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const supported=!!SR;
  let count=0;
  app.innerHTML=`<button class="back" id="spBack">← ${esc(l.name)}</button>
    <div class="speak-hero">
      <div class="tag">${esc([l.grade,l.unit].filter(Boolean).join(' • ')||'SPEAKING')}</div>
      <div class="word">${esc(it.text)}</div>
      ${it.meaning?`<div class="mean">${esc(it.meaning)}</div>`:''}
      <button class="listen" id="btnListen">🔊 원어민 발음 듣기</button>
    </div>
    <div class="card" style="margin-top:16px">
      <div style="display:flex; align-items:center; gap:10px">
        <h3 style="margin:0; flex:1">🎯 ${SPEAK_GOAL}회 따라 말하기</h3>
        <span class="muted" id="chalText">진행: 0 / ${SPEAK_GOAL}</span>
      </div>
      <div class="chal-dots" id="dots" style="margin-top:10px">${Array.from({length:SPEAK_GOAL},(_,i)=>`<span class="d" data-d="${i}">${i+1}</span>`).join('')}</div>
      <div class="mic-zone" style="margin-top:14px">
        <button class="mic-btn" id="mic">🎤</button>
        <div id="micMsg" class="muted">${supported?'버튼을 누르고 또박또박 말해요':'이 브라우저는 음성 인식이 안 돼요. 크롬에서 열어 주세요.'}</div>
      </div>
      <div class="score-row">
        <div><div class="muted" style="font-size:.8rem">인식된 발음</div><div class="heard" id="heard">대기 중…</div></div>
        <div><div class="muted" style="font-size:.8rem">발음 점수</div><div class="score-big" id="score">-- <span style="font-size:.9rem; color:var(--ink-soft)">/100</span></div></div>
      </div>
    </div>
    <div style="display:flex; gap:8px">
      <button class="btn ghost" id="prev" ${idx<=0?'disabled':''}>← 이전</button>
      <button class="btn" id="next" style="flex:1" ${idx>=l.items.length-1?'disabled':''}>다음 단어 →</button>
    </div>`;
  $('spBack').onclick=()=>{ speakStop(); speakList(listId); };
  $('btnListen').onclick=()=> speak(it.text);
  $('prev').onclick=()=>{ speakStop(); speakPractice(listId, idx-1); };
  $('next').onclick=()=>{ speakStop(); speakPractice(listId, idx+1); };
  const setDots=()=>{ app.querySelectorAll('#dots .d').forEach((d,i)=> d.classList.toggle('on', i<count)); $('chalText').textContent=`진행: ${count} / ${SPEAK_GOAL}`; };
  if(!supported){ $('mic').disabled=true; return; }
  const mic=$('mic');
  let micBusy=false;
  mic.onclick=async ()=>{
    if(micBusy) return;
    if(speakRec){ speakStop(); mic.classList.remove('rec'); $('micMsg').textContent='버튼을 누르고 또박또박 말해요'; return; }
    micBusy=true;
    // 1) 따라 말하기 전, 재생 중인 발음 듣기(TTS)를 멈춰 마이크 충돌을 막는다
    try{ if(ttsAudio){ ttsAudio.pause(); ttsAudio=null; } speechSynthesis.cancel(); }catch(e){}
    // 2) 클릭 제스처 안에서 마이크 권한을 명시적으로 확보한다
    $('micMsg').textContent='마이크를 준비하고 있어요…';
    const perm=await ensureMic();
    if(!perm.ok){
      const n=perm.err && perm.err.name;
      $('micMsg').textContent =
        (n==='NotAllowedError'||n==='SecurityError') ? '마이크 권한을 허용해 주세요 (주소창 자물쇠 🔒 → 마이크 → 허용)' :
        (n==='NotReadableError'||n==='AbortError')   ? '다른 앱이 마이크를 쓰고 있어요. 화면 녹화·화상수업·관제 앱을 닫고 다시 눌러 주세요' :
        (n==='NotFoundError')                        ? '마이크를 찾을 수 없어요. 기기에 마이크가 연결됐는지 확인해 주세요' :
                                                       '마이크를 시작할 수 없어요. 잠시 후 다시 눌러 주세요';
      mic.classList.remove('rec'); micBusy=false; return;
    }
    // 3) 마이크가 완전히 반납되도록 잠깐 기다린 뒤 음성 인식 시작
    await new Promise(res=> setTimeout(res,120));
    const r=new SR(); speakRec=r; r.lang='en-US'; r.interimResults=false; r.maxAlternatives=4;
    mic.classList.add('rec'); $('micMsg').textContent='듣고 있어요… 지금 말해보세요 🎙️';
    r.onresult=(e)=>{
      const alts=[...e.results[0]].map(a=>a.transcript);
      const {score, heard}=scoreSpeech(it.text, alts);
      $('heard').textContent=heard||'(못 알아들었어요)';
      $('score').innerHTML=`${score} <span style="font-size:.9rem; color:var(--ink-soft)">/100</span>`;
      $('score').style.color = score>=80?'var(--green-d)': score>=60?'#caa12e':'var(--coral-d)';
      if(score>=60){ if(count<SPEAK_GOAL) count++; setDots();
        $('micMsg').textContent = count>=SPEAK_GOAL ? '완료! 아주 잘했어요 🎉 다음 단어로 가볼까요?' : (score>=80?'아주 좋아요! 한 번 더 💯':'좋아요! 계속 말해봐요');
      } else { $('micMsg').textContent='다시 또박또박 말해볼까요? 🔊 발음을 한 번 더 들어봐도 좋아요'; }
    };
    r.onerror=(e)=>{
      const er=e.error;
      $('micMsg').textContent =
        (er==='not-allowed'||er==='service-not-allowed') ? '마이크 권한을 허용해 주세요' :
        (er==='audio-capture')                           ? '다른 앱이 마이크를 쓰고 있어요. 다른 앱을 닫고 다시 눌러 주세요' :
        (er==='no-speech')                               ? '소리가 안 들렸어요. 마이크에 가까이, 또박또박 말해 주세요' :
                                                           '잘 안 들렸어요. 다시 눌러 주세요';
      mic.classList.remove('rec'); speakRec=null;
    };
    r.onend=()=>{ mic.classList.remove('rec'); if(speakRec===r) speakRec=null; };
    try{ r.start(); }catch(e){ $('micMsg').textContent='마이크를 시작할 수 없어요. 다시 눌러 주세요'; mic.classList.remove('rec'); speakRec=null; }
    micBusy=false;
  };
}

  $('checkPing').onclick=async ()=>{

    const ago=Math.max(0,Math.round((Date.now()-p.at)/1000));
    $('pingResult').innerHTML=`📥 받은 신호 코드: <b style="font-size:1.6rem; color:var(--coral-d)">${p.code}</b> <span class="muted">(${ago}초 전)</span><br>이 코드가 <b>다른 기기에서 보낸 코드와 같으면</b> ✅ 기기 간 공유가 됩니다!`;
  };
  const peek=async ()=>{
    const cls=await sGet(KEYS.classes,[]), asg=await sGet(KEYS.assignments,[]), lst=await sGet(KEYS.lists,[]);

/* ============================ WRITING LIST LIBRARY ============================ */
function listMatchKey(g,u,n){ return `${(g||'').trim()}|${(u||'').trim()}|${(n||'').trim()}`; }
async function saveListToLibrary(meta, items, opts){
  opts=opts||{};
  if(!items || !items.length){ if(!opts.silent) toast('저장할 항목이 없어요'); return null; }
  const name=(meta.title||'').trim() || [meta.grade,meta.unit].filter(Boolean).join(' ') || '제목 없는 목록';
  const clean=items.map(i=>({id:i.id||uid(), text:i.text, meaning:i.meaning||'', type:i.type}));
  let existing = meta.sourceListId ? DB.lists.find(l=>l.id===meta.sourceListId) : null;
  if(!existing) existing = DB.lists.find(l=> listMatchKey(l.grade,l.unit,l.name)===listMatchKey(meta.grade,meta.unit,name));
  if(existing){
    Object.assign(existing,{ name, grade:meta.grade||'', unit:meta.unit||'', lesson:meta.lesson||'', items:clean, updatedAt:Date.now() });
  } else {
    existing={ id:uid(), name, grade:meta.grade||'', unit:meta.unit||'', lesson:meta.lesson||'', items:clean, updatedAt:Date.now() };
    DB.lists.push(existing);
  }
  await sSet(KEYS.lists, DB.lists);
  if(!opts.silent) toast('보관함에 저장했어요 📚');
  return existing.id;
}

/* ============================ ASSIGNMENT FORM ============================ */
let draft = null;
// 학급 이름에서 학년 숫자 추출 ("4학년 2반"→4, "4-2"→4)
function gradeNum(s){
  s=String(s||'');
  let m=s.match(/([1-6])\s*학년/); if(m) return m[1];
  m=s.match(/(?:^|[^0-9])([1-6])(?:[^0-9]|$)/); return m? m[1] : null;
}
function classesForGrade(grade){
  const g=(grade||'').trim();
  if(!g) return { list:DB.classes.slice(), all:true };
  const gn=gradeNum(g);
  const list=DB.classes.filter(c=> (c.name||'').includes(g) || (gn && gradeNum(c.name)===gn));
  if(!list.length) return { list:DB.classes.slice(), all:true, none:true };
  return { list, all:false };
}

function detectType(t){ return /\s/.test(t.trim()) ? 'sentence' : 'word'; }
// 영어와 뜻 분리: 탭, '=', ' / ' 순으로 첫 구분자에서 나눔
function splitMeaning(line){
  let en=line, meaning='';
  let idx=line.indexOf('\t');
  if(idx<0){ idx=line.indexOf('='); }
  if(idx<0){ idx=line.indexOf(' / '); if(idx>=0){ en=line.slice(0,idx); meaning=line.slice(idx+3); return {en:en.trim(), meaning:meaning.trim()}; } }
  if(idx>=0){ en=line.slice(0,idx); meaning=line.slice(idx+1); }
  return { en:en.trim(), meaning:meaning.trim() };
}

async function saveAssignment(){
  const title=$('aTitle').value.trim() || '영어 과제';
  const chosen = draft.items.filter(i=>i.sel).map(i=>({id:i.id,text:i.text,meaning:i.meaning||'',type:i.type}));
  if(!chosen.length){ toast('제시할 항목을 1개 이상 선택하세요'); return; }
  if(!draft.classIds.length){ toast('배부할 학급을 1개 이상 선택하세요'); return; }
  const grade=$('aGrade').value.trim(), unit=$('aUnit').value.trim(), lesson=$('aLesson').value.trim();
  const listId = await saveListToLibrary({ grade, unit, lesson, title, sourceListId:draft.sourceListId }, draft.items, {silent:true});
  const modes = draft.mode==='both' ? ['write','speak'] : [draft.mode||'write'];
  const now=Date.now(); let k=0;
  draft.classIds.forEach((classId)=>{
    modes.forEach((md)=>{
      DB.assignments.push({ id:uid(), classId, listId, title, grade, unit, lesson, mode:md,
        items:chosen.map(c=>({...c})), repeat:draft.repeat, createdAt:now + (k++) });
    });
  });
  await sSet(KEYS.assignments, DB.assignments);
  const n=draft.classIds.length;
  draft=null; toast(`${n}개 학급에 과제를 배부했어요! 🎉`); createAssignment();
}

async function doSpeakAssignment(aid){
  const a=DB.assignments.find(x=>x.id===aid);
  let prog=await sGet(progKey(aid,session.studentId),null);
  if(!prog) prog={ aid, sid:session.studentId, sname:session.name, counts:{}, done:false, updatedAt:Date.now() };
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const supported=!!SR;
  const total=a.items.length*a.repeat;
  const overall=()=>{ let c=0; for(const it of a.items) c+=Math.min(a.repeat, prog.counts[it.id]||0); return c; };
  const persist=async ()=>{ prog.updatedAt=Date.now(); await sSet(progKey(aid,session.studentId), prog); };
  const firstIncomplete=()=>{ for(let i=0;i<a.items.length;i++){ const it=a.items[i]; if((prog.counts[it.id]||0)<a.repeat) return i; } return -1; };

  speakStop();
  app.innerHTML=`<button class="back" id="spaBack">← 과제 목록</button>
    <div class="card"><h2 style="margin-top:4px">🗣️ ${esc(a.title)}</h2>
    <p class="muted">${[a.grade,a.unit,a.lesson].filter(Boolean).join(' / ')||''} · 각 항목 ${a.repeat}번씩 말해요</p>
    <div class="progress" style="margin-top:8px"><div id="spaProg"></div></div>
    <p class="muted" id="spaText" style="margin-top:8px"></p></div>
    <div id="spaItem"></div>`;
  $('spaBack').onclick=()=>{ speakStop(); studentAssignments(); };
  const updateBar=()=>{ const c=overall(); const pct=total?Math.round(c/total*100):0;
    const b=$('spaProg'); if(b) b.style.width=pct+'%'; const t=$('spaText'); if(t) t.textContent=`${c} / ${total} 번 완료 (${pct}%)`; };

  const renderItem=(idx)=>{
    speakStop();
    const it=a.items[idx];
    const area=$('spaItem'); if(!area) return;
    const done=Math.min(a.repeat, prog.counts[it.id]||0);
    area.innerHTML=`
      <div class="speak-hero">
        <div class="tag">${esc([a.grade,a.unit].filter(Boolean).join(' • ')||'SPEAKING')} · ${idx+1}/${a.items.length}</div>
        <div class="word">${esc(it.text)}</div>
        ${it.meaning?`<div class="mean">${esc(it.meaning)}</div>`:''}
        <button class="listen" id="btnListen">🔊 원어민 발음 듣기</button>
      </div>
      <div class="card" style="margin-top:16px">
        <div style="display:flex; align-items:center; gap:10px">
          <h3 style="margin:0; flex:1">🎯 ${a.repeat}회 따라 말하기</h3>
          <span class="muted" id="chalText">진행: ${done} / ${a.repeat}</span>
        </div>
        <div class="chal-dots" id="dots" style="margin-top:10px">${Array.from({length:a.repeat},(_,i)=>`<span class="d ${i<done?'on':''}" data-d="${i}">${i+1}</span>`).join('')}</div>
        <div class="mic-zone" style="margin-top:14px">
          <button class="mic-btn" id="mic">🎤</button>
          <div id="micMsg" class="muted">${supported?'마이크를 켜고 말하면, 말이 끝나면 자동으로 확인해요':'이 브라우저는 음성 인식이 안 돼요. 크롬에서 열어 주세요.'}</div>
        </div>
        <div class="score-row">
          <div><div class="muted" style="font-size:.8rem">인식된 발음</div><div class="heard" id="heard">대기 중…</div></div>
          <div><div class="muted" style="font-size:.8rem">발음 점수</div><div class="score-big" id="score">-- <span style="font-size:.9rem; color:var(--ink-soft)">/100</span></div></div>
        </div>
      </div>`;
    $('btnListen').onclick=()=> speak(it.text);
    updateBar();
    if(!supported){ $('mic').disabled=true; return; }
    const mic=$('mic');
    const setDots=()=>{ const d=Math.min(a.repeat, prog.counts[it.id]||0); app.querySelectorAll('#dots .d').forEach((el,i)=>el.classList.toggle('on',i<d)); $('chalText').textContent=`진행: ${d} / ${a.repeat}`; };
    mic.onclick=()=>{
      if(speakRec){ speakStop(); mic.classList.remove('rec'); return; }
      const r=new SR(); speakRec=r; r.lang='en-US'; r.interimResults=false; r.maxAlternatives=4;
      mic.classList.add('rec'); $('micMsg').textContent='듣고 있어요… 지금 말해보세요 🎙️';
      r.onresult=async (e)=>{
        const alts=[...e.results[0]].map(x=>x.transcript);
        const {score,heard}=scoreSpeech(it.text, alts);
        const hd=$('heard'); if(hd) hd.textContent=heard||'(못 알아들었어요)';
        const sc=$('score'); if(sc){ sc.innerHTML=`${score} <span style="font-size:.9rem; color:var(--ink-soft)">/100</span>`; sc.style.color=score>=80?'var(--green-d)':score>=60?'#caa12e':'var(--coral-d)'; }
        if(score>=60){
          const cur=prog.counts[it.id]||0;
          if(cur<a.repeat){ prog.counts[it.id]=cur+1; await persist(); setDots(); updateBar(); }
          if((prog.counts[it.id]||0)>=a.repeat){
            const msg=$('micMsg'); if(msg) msg.textContent='이 단어 완료! 🎉 다음으로 넘어가요';
            const nx=firstIncomplete();
            if(nx<0){ if(!prog.done){ prog.done=true; await persist(); } setTimeout(()=> showCeleb(), 700); }
            else setTimeout(()=> renderItem(nx), 900);
          } else { const msg=$('micMsg'); if(msg) msg.textContent= score>=80?'아주 좋아요! 한 번 더 💯':'좋아요! 계속 말해봐요'; }
        } else { const msg=$('micMsg'); if(msg) msg.textContent='다시 또박또박 말해볼까요? 🔊 발음을 들어봐도 좋아요'; }
      };
      r.onerror=(e)=>{ const msg=$('micMsg'); if(msg) msg.textContent=(e.error==='not-allowed'||e.error==='service-not-allowed')?'마이크 권한을 허용해 주세요':'잘 안 들렸어요. 다시 눌러 주세요'; mic.classList.remove('rec'); speakRec=null; };
      r.onend=()=>{ mic.classList.remove('rec'); if(speakRec===r) speakRec=null; };
      try{ r.start(); }catch(e){ const msg=$('micMsg'); if(msg) msg.textContent='마이크를 시작할 수 없어요'; mic.classList.remove('rec'); speakRec=null; }
    };
  };

  updateBar();
  const start=firstIncomplete();
  if(start<0){ showCeleb(); return; }
  renderItem(start);
}

function copiesPerLine(it){
  const N=engineState.a.repeat;
  if(/\s/.test(it.text.trim())) return 1;            // 문장은 한 줄에 하나
  const L=it.text.replace(/\s/g,'').length;
  let c = L<=4 ? 3 : L<=7 ? 2 : 1;                    // 낱말 길이에 따라 1~3칸
  return Math.max(1, Math.min(c, N));
}
function activeIdx(itemId){
  const n=engineState.prog.counts[itemId]||0;
  return n<engineState.a.repeat ? n : -1;
}
function buildItemCard(it, idx){
  const card=document.createElement('div'); card.className='card'; card.dataset.item=it.id;
  const repeat=engineState.a.repeat;
  const doneCount=Math.min(repeat, (engineState.prog.counts[it.id]||0));
  const cpl=copiesPerLine(it);
  let rowsHtml='';
  for(let start=0; start<repeat; start+=cpl){
    let cells='';
    for(let k=start; k<Math.min(start+cpl,repeat); k++){
      const isDone = k<doneCount;
      const cls = isDone? 'locked' : (k===doneCount? '' : 'future');
      cells += `<div class="trace-cell ${cls}" data-cell="${it.id}|${k}">
          <canvas class="bg"></canvas><canvas class="ink"></canvas>
          <span class="badge ${isDone?'ok show':''}">${isDone?'✓':''}</span>
        </div>`;
    }
    rowsHtml += `<div class="trace-row">${cells}</div>`;
  }
  const allDone = doneCount>=repeat;
  card.innerHTML=`
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px">
      <span class="ty" style="font-family:'Jua'; background:#F4EEDF; padding:3px 10px; border-radius:9px">${it.type==='word'?'낱말':'문장'}</span>
      <span class="muted" data-prog="${it.id}">${doneCount}/${repeat}번</span>
    </div>
    ${it.meaning? `<div style="background:#FBF3E0; border:2px solid var(--gold); border-radius:12px; padding:9px 13px; margin-bottom:8px">
        <span style="font-family:'Jua'; color:var(--green-d)">뜻</span>
        <span style="font-size:1.1rem; margin-left:6px">${esc(it.meaning)}</span>
      </div>` : ''}
    <p class="muted" style="margin:0 0 4px 2px">👀 보기 (영어를 따라 써요)</p>
    <div class="model-card trace-line" data-model="${it.id}" style="border-style:dashed; overflow:hidden">
      <canvas class="bg"></canvas>
    </div>
    <p class="muted" style="margin:12px 0 4px 2px">✏️ 흐린 영어 글자 위에 또박또박 따라 써요</p>
    ${rowsHtml}
    <div class="line-tools" data-itemtools="${it.id}" style="justify-content:space-between; align-items:center; ${allDone?'display:none':''}">
      <span class="muted" data-status="${it.id}">왼쪽 칸부터 차례로 써요</span>
      <span style="display:flex; gap:8px">
        <button class="btn ghost sm" data-clearitem="${it.id}">지우기</button>
        <button class="btn sm" data-checkitem="${it.id}">확인</button>
      </span>
    </div>`;
  return card;
}

function setupCanvas(canvas, w, h){
  const dpr=Math.min(window.devicePixelRatio||1, 2.5);
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  canvas.width=Math.round(w*dpr); canvas.height=Math.round(h*dpr);
  const ctx=canvas.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  return ctx;
}
function notebookGeom(h){ return { top:h*0.17, mid:h*0.46, base:h*0.74, desc:h*0.93 }; }
function drawNotebook(ctx,w,h,m){
  m = (m==null?8:m);
  const g=notebookGeom(h);
  ctx.clearRect(0,0,w,h);
  ctx.lineWidth=1.4;
  ctx.strokeStyle='#BFD8E6';
  [g.top,g.desc].forEach(y=>{ ctx.beginPath(); ctx.moveTo(m,y); ctx.lineTo(w-m,y); ctx.stroke(); });
  ctx.setLineDash([5,5]); ctx.strokeStyle='#CFE0EB';
  ctx.beginPath(); ctx.moveTo(m,g.mid); ctx.lineTo(w-m,g.mid); ctx.stroke(); ctx.setLineDash([]);
  ctx.strokeStyle='#E0876B'; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.moveTo(m,g.base); ctx.lineTo(w-m,g.base); ctx.stroke();
  return g;
}
function fitFontSize(ctx, text, w, baseSize, pad){
  let size=baseSize;
  do{ ctx.font=`700 ${size}px Andika, sans-serif`;
    if(ctx.measureText(text).width <= (w-pad*2)) break; size-=2;
  } while(size>14);
  return size;
}
function drawGlyphs(ctx, text, w, h, color, weight, opts){
  opts=opts||{}; const pad=opts.padding==null?14:opts.padding;
  const g=notebookGeom(h);
  const size=fitFontSize(ctx, text, w, h*0.5, pad);
  ctx.font=`${weight} ${size}px Andika, sans-serif`;
  ctx.textBaseline='alphabetic'; ctx.textAlign='left';
  ctx.fillStyle=color;
  const tw=ctx.measureText(text).width;
  const x = opts.center ? Math.max(pad,(w-tw)/2) : pad;
  ctx.fillText(text, x, g.base-2);
  return {size, x, tw};
}

function clampH(w){ return Math.min(140, Math.max(96, Math.round(w*0.18))); }

function initItemCanvases(it){
  const card=app.querySelector(`[data-item="${it.id}"]`);
  if(!card) return;
  // model line (bold black, single copy)
  const modelWrap=card.querySelector(`[data-model="${it.id}"]`);
  const w=Math.max(220, modelWrap.clientWidth); const hh=clampH(w);
  const mctx=setupCanvas(modelWrap.querySelector('canvas'), w, hh);
  drawNotebook(mctx,w,hh,8); drawGlyphs(mctx, it.text, w, hh, '#1F1D19', '700', {padding:14});

  const doneCount=engineState.prog.counts[it.id]||0;
  // each row shares one height; cells fill the row width equally
  card.querySelectorAll('.trace-row').forEach(row=>{
    const rowW=Math.max(160, row.clientWidth); const bh=clampH(rowW);
    row.querySelectorAll('.trace-cell').forEach(cell=>{
      const k=+cell.dataset.cell.split('|')[1];
      const bw=Math.max(80, cell.clientWidth);
      const bg=cell.querySelector('.bg'); const ink=cell.querySelector('.ink');
      const bctx=setupCanvas(bg, bw, bh); const ictx=setupCanvas(ink, bw, bh);
      drawNotebook(bctx,bw,bh,2);
      const isDone=doneCount>k;
      const r=drawGlyphs(bctx, it.text, bw, bh, isDone?'#1F1D19':'rgba(40,40,55,0.20)','700', {center:true,padding:8});
      const targetLogic=document.createElement('canvas'); targetLogic.width=bw; targetLogic.height=bh;
      const tlctx=targetLogic.getContext('2d');
      drawGlyphs(tlctx, it.text, bw, bh, '#000','700', {center:true,padding:8});
      const inkLogic=document.createElement('canvas'); inkLogic.width=bw; inkLogic.height=bh;
      const ilctx=inkLogic.getContext('2d');
      cell._engine={ itemId:it.id, k, bw, bh, ictx, bctx, tlctx, ilctx, targetLogic, inkLogic, drawn:false, fontSize:r.size };
      if(!isDone && !cell.classList.contains('future')) attachDrawing(cell, ink);
    });
  });
  // single toolbar acts on the active (next unfinished) cell of this item
  const clearB=card.querySelector(`[data-clearitem="${it.id}"]`);
  const checkB=card.querySelector(`[data-checkitem="${it.id}"]`);
  if(clearB) clearB.onclick=()=>{ const k=activeIdx(it.id); if(k>=0) clearLine(it.id,k); };
  if(checkB) checkB.onclick=()=>{ const k=activeIdx(it.id); if(k>=0) checkLine(it.id,k); };
}

function attachDrawing(cell, ink){
  const e=cell._engine; let drawing=false, last=null;
  const lwV=Math.max(5, (e.fontSize||40)*0.16);
  const lwL=Math.max(7, (e.fontSize||40)*0.20);
  const pos=(ev)=>{ const r=ink.getBoundingClientRect(); const p=ev.touches?ev.touches[0]:ev;
    return { x:(p.clientX-r.left)*(e.bw/r.width), y:(p.clientY-r.top)*(e.bh/r.height) }; };
  const stroke=(ctx,a,b,lw,col)=>{ ctx.lineCap='round'; ctx.lineJoin='round'; ctx.lineWidth=lw; ctx.strokeStyle=col;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); };
  const down=(ev)=>{ ev.preventDefault(); drawing=true; last=pos(ev); e.drawn=true;
    e.ictx.fillStyle='#1B3A6B'; e.ictx.beginPath(); e.ictx.arc(last.x,last.y,lwV*0.55,0,7); e.ictx.fill();
    e.ilctx.fillStyle='#000'; e.ilctx.beginPath(); e.ilctx.arc(last.x,last.y,lwL*0.55,0,7); e.ilctx.fill(); };
  const move=(ev)=>{ if(!drawing)return; ev.preventDefault(); const p=pos(ev);
    stroke(e.ictx,last,p,lwV,'#1B3A6B'); stroke(e.ilctx,last,p,lwL,'#000'); last=p; };
  const up=()=>{ drawing=false; };
  ink.addEventListener('mousedown',down); ink.addEventListener('mousemove',move);
  window.addEventListener('mouseup',up);
  ink.addEventListener('touchstart',down,{passive:false}); ink.addEventListener('touchmove',move,{passive:false});
  ink.addEventListener('touchend',up);
}

function clearLine(itemId,k){
  const cell=app.querySelector(`[data-cell="${itemId}|${k}"]`); if(!cell) return;
  const e=cell._engine; if(!e) return;
  e.ictx.clearRect(0,0,e.bw,e.bh); e.ilctx.clearRect(0,0,e.bw,e.bh); e.drawn=false;
  const badge=cell.querySelector('.badge'); badge.className='badge'; badge.textContent='';
  const st=app.querySelector(`[data-status="${itemId}"]`); if(st) st.textContent='흐린 글자 위에 또박또박 써요';
}

/* --- scoring --- */
function maskFrom(ctx,w,h,ds){
  const data=ctx.getImageData(0,0,w,h).data; const W=Math.ceil(w/ds), H=Math.ceil(h/ds);
  const m=new Uint8Array(W*H);
  for(let y=0;y<h;y+=ds){ for(let x=0;x<w;x+=ds){ const i=(y*w+x)*4; if(data[i+3]>40){ m[(y/ds|0)*W+(x/ds|0)]=1; } } }
  return {m,W,H};
}
function dilate(m,W,H,R){
  const tmp=new Uint8Array(W*H), out=new Uint8Array(W*H);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){ let v=0; for(let dx=-R;dx<=R;dx++){const nx=x+dx; if(nx<0||nx>=W)continue; if(m[y*W+nx]){v=1;break;}} tmp[y*W+x]=v; }
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){ let v=0; for(let dy=-R;dy<=R;dy++){const ny=y+dy; if(ny<0||ny>=H)continue; if(tmp[ny*W+x]){v=1;break;}} out[y*W+x]=v; }
  return out;
}
function cnt(m){let c=0;for(let i=0;i<m.length;i++)c+=m[i];return c;}
function scoreLine(e){
  const ds=2, R=6;
  const T=maskFrom(e.tlctx,e.bw,e.bh,ds);
  const I=maskFrom(e.ilctx,e.bw,e.bh,ds);
  const tC=cnt(T.m), iC=cnt(I.m);
  if(tC===0) return {verdict:'pass'}; // safety
  const dT=dilate(T.m,T.W,T.H,R), dI=dilate(I.m,I.W,I.H,R);
  let cov=0; for(let i=0;i<T.m.length;i++) if(T.m[i]&&dI[i]) cov++;
  let on=0; for(let i=0;i<I.m.length;i++) if(I.m[i]&&dT[i]) on++;
  const coverage=cov/tC, onTarget= iC? on/iC:0, inkRatio=iC/tC;
  const enough = iC >= 0.22*tC;
  const great = enough && inkRatio<=1.7 && coverage>=0.78 && onTarget>=0.72;
  const pass  = enough && inkRatio<=2.1 && coverage>=0.5 && onTarget>=0.55;
  return { verdict: great?'great': pass?'pass':'fail', coverage, onTarget, inkRatio, iC, tC };
}

async function checkLine(itemId,k){
  const cell=app.querySelector(`[data-cell="${itemId}|${k}"]`); if(!cell) return;
  const e=cell._engine; if(!e) return;
  const badge=cell.querySelector('.badge');
  const st=app.querySelector(`[data-status="${itemId}"]`);
  if(!e.drawn){ badge.className='badge try show'; badge.textContent='✍️'; if(st) st.textContent='먼저 칸 안에 써 볼까요? ✍️'; return; }
  const r=scoreLine(e);
  if(r.verdict==='fail'){
    badge.className='badge try show'; badge.textContent='✗';
    if(st) st.textContent='조금만 더 또박또박 따라 써요 ✍️';
    return;
  }
  // pass / great -> lock this cell
  badge.className='badge ok show'; badge.textContent='✓';
  if(st) st.textContent = r.verdict==='great'? '딱 맞췄어요! 💯' : '잘 했어요! 다음 칸을 써요 ✓';
  cell.classList.add('locked');
  drawNotebook(e.bctx,e.bw,e.bh,2);
  drawGlyphs(e.bctx, engineState.a.items.find(i=>i.id===itemId).text, e.bw, e.bh, '#1F1D19','700', {center:true,padding:8});
  // record progress
  const prev=engineState.prog.counts[itemId]||0;
  engineState.prog.counts[itemId]=Math.max(prev, k+1);
  engineState.prog.updatedAt=Date.now();
  // reveal next cell
  const nextCell=app.querySelector(`[data-cell="${itemId}|${k+1}"]`);
  if(nextCell){ nextCell.classList.remove('future'); if(nextCell._engine) attachDrawing(nextCell, nextCell.querySelector('.ink')); }
  else { // item finished -> hide its toolbar
    const tools=app.querySelector(`[data-itemtools="${itemId}"]`); if(tools) tools.style.display='none';
    if(st) st.textContent='이 낱말 완료! 🎉';
  }
  const lbl=app.querySelector(`[data-prog="${itemId}"]`);
  if(lbl) lbl.textContent=`${engineState.prog.counts[itemId]}/${engineState.a.repeat}번`;
  await persistProgress();
  updateOverall();
}

function updateOverall(){
  const a=engineState.a; const total=a.items.length*a.repeat;
  let cnt=0; for(const it of a.items) cnt+=Math.min(a.repeat, engineState.prog.counts[it.id]||0);
  const pct= total? Math.round(cnt/total*100):0;
  const bar=$('ovProg'); if(bar) bar.style.width=pct+'%';
  const txt=$('ovText'); if(txt) txt.textContent=`${cnt} / ${total} 칸 완료 (${pct}%)`;
  if(cnt>=total && !engineState.prog.done){ engineState.prog.done=true; persistProgress(); showCeleb(); }
}
async function persistProgress(){
  await sSet(progKey(engineState.a.id, session.studentId), engineState.prog);
}
function showCeleb(){ $('celebrate').classList.add('show'); }
function closeCeleb(){ $('celebrate').classList.remove('show'); studentAssignments(); }

<!-- Firebase (모듈 SDK) : 전용 Firestore DB + 인증(선생님 로그인 / 학생 익명) -->
<script type="module">
(async ()=>{
  const cfg = window.__cfg || {};
  const finish = ()=>{ if(window.boot) window.boot(); };
  if(!cfg.ready){ window.__backend = { ready:false }; return finish(); }
  try{
    const imp = async (urls)=>{ let err; for(const u of urls){ try{ return await import(u); }catch(e){ err=e; } } throw err; };
    const V="10.12.5";
    const appMod = await imp([`https://cdn.jsdelivr.net/npm/firebase@${V}/app/+esm`, `https://www.gstatic.com/firebasejs/${V}/firebase-app.js`]);
    const fsMod  = await imp([`https://cdn.jsdelivr.net/npm/firebase@${V}/firestore/+esm`, `https://www.gstatic.com/firebasejs/${V}/firebase-firestore.js`]);
    const auMod  = await imp([`https://cdn.jsdelivr.net/npm/firebase@${V}/auth/+esm`, `https://www.gstatic.com/firebasejs/${V}/firebase-auth.js`]);
    const { initializeApp } = appMod;
    const { getFirestore, doc, getDoc, setDoc, deleteDoc, onSnapshot } = fsMod;
    const { getAuth, onAuthStateChanged, signInAnonymously, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, sendPasswordResetEmail } = auMod;
    const appFb = initializeApp(cfg.config);
    const db = cfg.dbId ? getFirestore(appFb, cfg.dbId) : getFirestore(appFb);
    const auth = getAuth(appFb);
    // 항상 누군가는 로그인된 상태로 만들기(없으면 익명) — 그래야 읽기/진행 저장 가능
    await new Promise((res)=>{
      let done=false;
      onAuthStateChanged(auth, (u)=>{
        window.__user = u || null;
        if(window.__onUser) window.__onUser(u||null);
        if(!done){ done=true; if(!u){ signInAnonymously(auth).catch(()=>{}).finally(res); } else res(); }
      });
    });
    window.__store = {
      async get(col, id){ const s = await getDoc(doc(db, col, id)); return s.exists() ? s.data().value : undefined; },
      async set(col, id, value){ await setDoc(doc(db, col, id), { value }); },
      async del(col, id){ await deleteDoc(doc(db, col, id)); },
      watch(col, id, cb){ onSnapshot(doc(db, col, id), s=>{ if(s.exists()) cb(s.data().value); }); }
    };
    window.__auth = {
      current:()=> auth.currentUser,
      isTeacher:()=> { const u=auth.currentUser; return !!(u && !u.isAnonymous); },
      email:()=> { const u=auth.currentUser; return (u && u.email) || ''; },
      async signIn(email,pw){ await signInWithEmailAndPassword(auth, email, pw); },
      async signUp(email,pw){ await createUserWithEmailAndPassword(auth, email, pw); },
      async resetPassword(email){ await sendPasswordResetEmail(auth, email); },
      async signOutToAnon(){ try{ await signOut(auth); }catch(e){} try{ await signInAnonymously(auth); }catch(e){} }
    };
    // 고품질 TTS 콜러블 함수 연결 (실패해도 앱 본체/저장은 그대로 동작)
    try{
      const fnMod = await imp([`https://cdn.jsdelivr.net/npm/firebase@${V}/functions/+esm`, `https://www.gstatic.com/firebasejs/${V}/firebase-functions.js`]);
      const { getFunctions, httpsCallable } = fnMod;
      const functions = getFunctions(appFb, 'asia-northeast3');
      const ttsCallable = httpsCallable(functions, 'ttsSpeak');
      window.__tts = async (text, voice)=>{ const r = await ttsCallable({ text, voice }); return r && r.data && r.data.url; };
    }catch(e){ console.warn('tts init failed', e); }
    window.__backend = { ready:true };
  }catch(e){
    window.__backend = { ready:false, error:(e && e.message) || String(e) };
  }
  finish();
})();
</script>
